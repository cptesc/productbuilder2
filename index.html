<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Casino | Modern Number Generator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for better typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
        <span class="icon">🌓</span>
    </button>

    <main class="container">
        <header>
            <h1>Lotto Casino</h1>
            <div class="pouch-container">
                <div id="lotto-pouch" class="lotto-pouch">
                    <span class="pouch-icon">💰</span>
                </div>
            </div>
        </header>
        
        <div id="draw-sets" class="draw-sets">
            <!-- 5 Sets of lotto balls will be injected here -->
             <div class="draw-row" data-row="1"></div>
             <div class="draw-row" data-row="2"></div>
             <div class="draw-row" data-row="3"></div>
             <div class="draw-row" data-row="4"></div>
             <div class="draw-row" data-row="5"></div>
        </div>

        <div class="controls">
            <div class="lever-wrapper">
                <div id="lever" class="lever">
                    <div class="lever-handle"></div>
                    <div class="lever-base"></div>
                </div>
                <span class="lever-label">Pull to Draw</span>
            </div>
        </div>

        <section class="history-section">
            <h2>Recent Draw Results</h2>
            <div id="history-list" class="history-list">
                <!-- Previous draws will appear here -->
            </div>
        </section>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
